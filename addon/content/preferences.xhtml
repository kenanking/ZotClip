<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link
    rel="stylesheet"
    href="chrome://__addonRef__/content/preferences.css"
  />
</linkset>
<groupbox
  class="zotclip-pref-group"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <label class="zotclip-pref-section"
    ><html:h3 data-l10n-id="pref-section-copy"></html:h3
  ></label>

  <hbox class="zotclip-pref-row" align="center">
    <html:label
      class="zotclip-pref-field-label"
      for="zotero-prefpane-__addonRef__-multi-attachment-mode"
      data-l10n-id="pref-multi-attachment-mode"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-multi-attachment-mode"
      class="zotclip-pref-menulist"
      preference="multiAttachmentMode"
    >
      <menupopup>
        <menuitem value="all" data-l10n-id="pref-multi-attachment-mode-all" />
        <menuitem
          value="primary"
          data-l10n-id="pref-multi-attachment-mode-primary"
        />
      </menupopup>
    </menulist>
  </hbox>

  <separator class="thin" />

  <vbox class="zotclip-pref-section" data-zotclip-types-panel="true">
    <label><html:h3 data-l10n-id="pref-section-types"></html:h3></label>

    <html:label
      class="zotclip-pref-field-label"
      data-l10n-id="pref-type-presets"
    ></html:label>

    <html:div class="zotclip-pref-type-grid">
      <html:label class="zotclip-pref-type-option">
        <html:input type="checkbox" data-zotclip-attachment-type="pdf" />
        <html:span data-l10n-id="pref-type-pdf"></html:span>
      </html:label>
      <html:label class="zotclip-pref-type-option">
        <html:input type="checkbox" data-zotclip-attachment-type="epub" />
        <html:span data-l10n-id="pref-type-epub"></html:span>
      </html:label>
      <html:label class="zotclip-pref-type-option">
        <html:input type="checkbox" data-zotclip-attachment-type="mobi" />
        <html:span data-l10n-id="pref-type-mobi"></html:span>
      </html:label>
      <html:label class="zotclip-pref-type-option">
        <html:input type="checkbox" data-zotclip-attachment-type="txt" />
        <html:span data-l10n-id="pref-type-txt"></html:span>
      </html:label>
    </html:div>

    <vbox class="zotclip-pref-field">
      <html:label
        class="zotclip-pref-field-label"
        for="zotero-prefpane-__addonRef__-custom-attachment-types"
        data-l10n-id="pref-custom-types"
      ></html:label>
      <html:input
        id="zotero-prefpane-__addonRef__-custom-attachment-types"
        class="zotclip-pref-textinput"
        type="text"
        data-zotclip-custom-types="true"
      />
      <description class="zotclip-pref-help">
        <html:span data-l10n-id="pref-custom-types-help"></html:span>
      </description>
      <description
        class="zotclip-pref-validation"
        data-zotclip-type-validation="true"
        hidden="hidden"
      >
        <html:span data-l10n-id="pref-type-validation"></html:span>
      </description>
    </vbox>
  </vbox>

  <separator class="thin" />

  <label class="zotclip-pref-section"
    ><html:h3 data-l10n-id="pref-section-shortcuts"></html:h3
  ></label>

  <description class="zotclip-pref-help">
    <html:span data-l10n-id="pref-shortcut-scope-note"></html:span>
  </description>

  <vbox class="zotclip-pref-field">
    <html:label
      class="zotclip-pref-field-label"
      for="zotero-prefpane-__addonRef__-library-shortcut"
      data-l10n-id="pref-library-shortcut"
    ></html:label>
    <html:input
      id="zotero-prefpane-__addonRef__-library-shortcut"
      class="zotclip-pref-textinput"
      type="text"
      data-zotclip-library-shortcut="true"
    />
    <description class="zotclip-pref-help">
      <html:span data-l10n-id="pref-library-shortcut-help"></html:span>
    </description>
  </vbox>

  <vbox class="zotclip-pref-field">
    <html:label
      class="zotclip-pref-field-label"
      for="zotero-prefpane-__addonRef__-reader-shortcut"
      data-l10n-id="pref-reader-shortcut"
    ></html:label>
    <html:input
      id="zotero-prefpane-__addonRef__-reader-shortcut"
      class="zotclip-pref-textinput"
      type="text"
      data-zotclip-reader-shortcut="true"
    />
    <description class="zotclip-pref-help">
      <html:span data-l10n-id="pref-reader-shortcut-help"></html:span>
    </description>
    <description
      class="zotclip-pref-validation"
      data-zotclip-shortcut-validation="true"
      hidden="hidden"
    >
      <html:span data-l10n-id="pref-shortcut-validation"></html:span>
    </description>
    <description
      class="zotclip-pref-validation"
      data-zotclip-shortcut-conflict="true"
      hidden="hidden"
    >
      <html:span data-l10n-id="pref-shortcut-conflict"></html:span>
    </description>
  </vbox>

  <description class="zotclip-pref-help">
    <html:span data-l10n-id="pref-compatibility-note"></html:span>
  </description>

  <separator class="thin" />

  <label class="zotclip-pref-section"
    ><html:h3 data-l10n-id="pref-section-compatibility"></html:h3
  ></label>

  <vbox class="zotclip-pref-field">
    <html:label
      class="zotclip-pref-field-label"
      data-l10n-id="pref-diagnostics"
    ></html:label>
    <description class="zotclip-pref-help">
      <html:pre
        class="zotclip-pref-diagnostics"
        data-zotclip-diagnostics-value="true"
      ></html:pre>
    </description>
  </vbox>
</groupbox>
<vbox class="zotclip-pref-build">
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
