<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <label><html:h3 data-l10n-id="pref-section-copy"></html:h3></label>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-multi-attachment-mode"
      data-l10n-id="pref-multi-attachment-mode"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-multi-attachment-mode"
      preference="multiAttachmentMode"
    >
      <menupopup>
        <menuitem value="all" data-l10n-id="pref-multi-attachment-mode-all" />
        <menuitem
          value="primary"
          data-l10n-id="pref-multi-attachment-mode-primary"
        />
      </menupopup>
    </menulist>
  </hbox>

  <separator class="thin" />

  <vbox data-zotclip-types-panel="true">
    <label><html:h3 data-l10n-id="pref-section-types"></html:h3></label>

    <description>
      <html:span data-l10n-id="pref-type-presets"></html:span>
    </description>

    <html:div>
      <html:label>
        <html:input type="checkbox" data-zotclip-attachment-type="pdf" />
        <html:span data-l10n-id="pref-type-pdf"></html:span>
      </html:label>
      <html:label>
        <html:input type="checkbox" data-zotclip-attachment-type="epub" />
        <html:span data-l10n-id="pref-type-epub"></html:span>
      </html:label>
      <html:label>
        <html:input type="checkbox" data-zotclip-attachment-type="mobi" />
        <html:span data-l10n-id="pref-type-mobi"></html:span>
      </html:label>
      <html:label>
        <html:input type="checkbox" data-zotclip-attachment-type="txt" />
        <html:span data-l10n-id="pref-type-txt"></html:span>
      </html:label>
    </html:div>

    <vbox>
      <html:label
        for="zotero-prefpane-__addonRef__-custom-attachment-types"
        data-l10n-id="pref-custom-types"
      ></html:label>
      <html:input
        id="zotero-prefpane-__addonRef__-custom-attachment-types"
        type="text"
        data-zotclip-custom-types="true"
      />
      <description>
        <html:span data-l10n-id="pref-custom-types-help"></html:span>
      </description>
      <description data-zotclip-type-validation="true" hidden="hidden">
        <html:span data-l10n-id="pref-type-validation"></html:span>
      </description>
    </vbox>
  </vbox>

  <separator class="thin" />

  <label><html:h3 data-l10n-id="pref-section-compatibility"></html:h3></label>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-reader-ctrl-c-mode"
      data-l10n-id="pref-reader-ctrl-c-mode"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-reader-ctrl-c-mode"
      preference="readerCtrlCMode"
    >
      <menupopup>
        <menuitem value="smart" data-l10n-id="pref-reader-ctrl-c-mode-smart" />
        <menuitem value="never" data-l10n-id="pref-reader-ctrl-c-mode-never" />
        <menuitem
          value="always"
          data-l10n-id="pref-reader-ctrl-c-mode-always"
        />
      </menupopup>
    </menulist>
  </hbox>

  <checkbox
    id="zotero-prefpane-__addonRef__-allow-path-fallback"
    preference="allowPathFallback"
    data-l10n-id="pref-allow-path-fallback"
  />

  <description>
    <html:span data-l10n-id="pref-compatibility-note"></html:span>
  </description>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
